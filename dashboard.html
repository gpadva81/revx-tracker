<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Active Funnel — Click Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path d='M24 8v20l-12 24a4 4 0 003.6 5.6h32.8A4 4 0 0052 52L40 28V8' fill='none' stroke='%236366f1' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/><path d='M20 8h24' fill='none' stroke='%236366f1' stroke-width='4' stroke-linecap='round'/><ellipse cx='32' cy='46' rx='10' ry='4' fill='%236366f180'/><circle cx='30' cy='40' r='3' fill='%2322c55e80'/><circle cx='36' cy='44' r='2' fill='%23eab30880'/></svg>">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #8b8d97;
    --accent: #6366f1;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
    --orange: #f97316;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    padding: 24px 32px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .controls { display: flex; gap: 8px; align-items: center; }
  .controls select, .controls button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .controls button:hover { border-color: var(--accent); }
  .controls .live-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .grid { padding: 0 32px 32px; }

  /* Summary cards */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .stat-card .value { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
  .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.blue { color: var(--blue); }
  .stat-card .value.yellow { color: var(--yellow); }
  .stat-card .value.orange { color: var(--orange); }
  .stat-card .value.accent { color: var(--accent); }

  /* Section titles */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    margin-top: 8px;
  }

  /* Panels */
  .panels {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px 12px;
    font-size: 14px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-header .badge {
    font-size: 11px;
    font-weight: 600;
    background: rgba(99,102,241,0.15);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 10px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 10px 16px;
    color: var(--muted);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(99,102,241,0.05); }
  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
  .right { text-align: right; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-lead { background: rgba(59,130,246,0.15); color: var(--blue); }
  .tag-call { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag-click { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .tag-unknown { background: rgba(139,141,151,0.15); color: var(--muted); }
  .tag-meta { background: rgba(59,130,246,0.15); color: var(--blue); }
  .tag-youtube { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag-search { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag-landing { background: rgba(99,102,241,0.15); color: var(--accent); }
  .tag-offer { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .tag-presale { background: rgba(249,115,22,0.15); color: var(--orange); }
  .tag-conversion { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag-mobile { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag-desktop { background: rgba(59,130,246,0.15); color: var(--blue); }
  .tag-tablet { background: rgba(234,179,8,0.15); color: var(--yellow); }

  /* Daily chart */
  .chart-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .chart-header { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 160px;
    padding-bottom: 24px;
    position: relative;
  }
  .bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
    position: relative;
  }
  .bar {
    width: 100%;
    max-width: 40px;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    position: relative;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .bar:hover { opacity: 0.8; }
  .bar-label { font-size: 10px; color: var(--muted); margin-top: 6px; position: absolute; bottom: -22px; }
  .bar-value { font-size: 10px; color: var(--text); margin-bottom: 4px; font-weight: 600; }

  /* Funnel visualization */
  .funnel-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .funnel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 20px;
  }
  .funnel-step {
    margin-bottom: 12px;
  }
  .funnel-step-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .funnel-step-name {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
  }
  .funnel-step-icon { font-size: 16px; }
  .funnel-step-stats { display: flex; gap: 16px; align-items: center; }
  .funnel-step-count { font-size: 18px; font-weight: 700; color: var(--text); }
  .funnel-step-pct { font-size: 12px; color: var(--muted); }
  .funnel-dropoff {
    font-size: 11px;
    background: rgba(239,68,68,0.15);
    color: var(--red);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .funnel-bar-track {
    height: 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    overflow: hidden;
  }
  .funnel-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .funnel-bar-fill.landing { background: var(--accent); }
  .funnel-bar-fill.presale { background: var(--orange); }
  .funnel-bar-fill.offer { background: var(--yellow); }
  .funnel-bar-fill.conversion { background: var(--green); }

  /* Live visitor feed */
  .visitor-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .visitor-row:last-child { border-bottom: none; }
  .visitor-row:hover { background: rgba(99,102,241,0.08); }
  .visitor-device-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
  .visitor-info { flex: 1; min-width: 0; }
  .visitor-location { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .visitor-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .visitor-step { flex-shrink: 0; }
  .visitor-events { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .visitor-time { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

  /* Paths */
  .path-row { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .path-row:last-child { border-bottom: none; }
  .path-text { color: var(--text); font-weight: 500; }
  .path-arrow { color: var(--muted); }
  .path-bar-wrap { margin-top: 6px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; }
  .path-bar { height: 100%; background: var(--accent); border-radius: 2px; opacity: 0.7; }
  .path-meta { display: flex; justify-content: space-between; margin-top: 4px; font-size: 11px; color: var(--muted); }

  /* Activity feed */
  .activity-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .activity-dot.lead { background: var(--blue); }
  .activity-dot.call { background: var(--green); }
  .activity-dot.click_event { background: var(--yellow); }
  .activity-dot.unknown { background: var(--muted); }
  .activity-text { flex: 1; font-size: 13px; }
  .activity-time { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .activity-amount { font-weight: 700; font-size: 13px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    overflow-y: auto;
    padding: 32px 16px;
  }
  .modal-overlay.open { display: flex; justify-content: center; align-items: flex-start; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 680px;
    overflow: hidden;
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 { font-size: 16px; font-weight: 700; }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .modal-close:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .modal-body { padding: 24px; }
  .modal-meta {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .modal-meta-item { }
  .modal-meta-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .modal-meta-value { font-size: 14px; font-weight: 600; }
  .timeline-section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .timeline { position: relative; padding-left: 20px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 4px;
    bottom: 4px;
    width: 2px;
    background: var(--border);
  }
  .timeline-item { position: relative; margin-bottom: 12px; padding-left: 20px; }
  .timeline-dot {
    position: absolute;
    left: -17px;
    top: 4px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    border: 2px solid var(--card);
  }
  .timeline-dot.pageview { background: var(--accent); }
  .timeline-dot.scroll { background: var(--blue); }
  .timeline-dot.time_on_page { background: var(--muted); }
  .timeline-dot.cta_click { background: var(--yellow); }
  .timeline-dot.form_start { background: var(--orange); }
  .timeline-dot.form_submit { background: var(--green); }
  .timeline-dot.conversion { background: var(--green); }
  .timeline-dot.funnel { background: var(--accent); width: 12px; height: 12px; left: -18px; }
  .timeline-event { font-size: 13px; font-weight: 500; }
  .timeline-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .timeline-time { font-size: 11px; color: var(--muted); }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 64px; color: var(--muted); }

  @media (max-width: 768px) {
    .header { padding: 16px; }
    .grid { padding: 0 16px 16px; }
    .panels { grid-template-columns: 1fr; }
    .summary { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>●</span> Active Funnel Tracker</h1>
  <div class="controls">
    <div class="live-dot"></div>
    <select id="daysPicker">
      <option value="1">Today</option>
      <option value="3">Last 3 days</option>
      <option value="7" selected>Last 7 days</option>
      <option value="14">Last 14 days</option>
      <option value="30">Last 30 days</option>
    </select>
    <button onclick="loadData()">⟳ Refresh</button>
    <a href="/logout" style="text-decoration:none"><button>Sign Out</button></a>
  </div>
</div>

<div class="grid">

  <!-- Summary Stats -->
  <div class="summary" id="summary"></div>

  <!-- Daily Revenue Chart -->
  <div class="chart-container">
    <div class="chart-header">Daily Revenue</div>
    <div id="chart" class="bar-chart"></div>
  </div>

  <!-- Funnel Visualization -->
  <div class="funnel-container">
    <div class="funnel-header">
      <span>Funnel Overview</span>
      <span id="funnelPeriod" style="font-size:12px;color:var(--muted);font-weight:400"></span>
    </div>
    <div id="funnelViz"><div class="loading">Loading funnel…</div></div>
  </div>

  <!-- Revenue breakdown panels -->
  <div class="panels">
    <div class="panel">
      <div class="panel-header">Revenue by Source</div>
      <div id="sourceTable"></div>
    </div>
    <div class="panel">
      <div class="panel-header">Top States</div>
      <div id="stateTable"></div>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-header">RPL by Campaign</div>
      <div id="campaignTable"></div>
    </div>
    <div class="panel">
      <div class="panel-header">Recent Activity</div>
      <div id="activityFeed"></div>
    </div>
  </div>

  <!-- Funnel / Visitor panels -->
  <div class="panels">
    <div class="panel">
      <div class="panel-header">
        Live Visitors
        <span class="badge" id="visitorCount">0</span>
      </div>
      <div id="visitorFeed"></div>
    </div>
    <div class="panel">
      <div class="panel-header">Conversion Paths</div>
      <div id="pathsList"></div>
    </div>
  </div>

</div>

<!-- Visitor Detail Modal -->
<div class="modal-overlay" id="visitorModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Visitor Journey</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="loading">Loading…</div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let autoRefresh;

function $(id) { return document.getElementById(id); }

function fmt(n) {
  const v = parseFloat(n) || 0;
  return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function num(n) {
  return (parseInt(n) || 0).toLocaleString();
}

function pct(n) {
  return (parseFloat(n) || 0).toFixed(1) + '%';
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function shortDate(dateStr) {
  const d = new Date(dateStr);
  return (d.getMonth() + 1) + '/' + d.getDate();
}

function fmtTime(ms) {
  if (!ms || ms <= 0) return '—';
  const s = Math.round(ms / 1000);
  if (s < 60) return s + 's';
  return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
}

function tagHTML(type) {
  const cls = 'tag-' + (type || 'unknown').toLowerCase();
  return '<span class="tag ' + cls + '">' + (type || 'unknown') + '</span>';
}

function deviceIcon(device) {
  if (device === 'mobile') return '📱';
  if (device === 'tablet') return '🖥️';
  return '💻';
}

function stepIcon(step) {
  if (step === 'conversion') return '✅';
  if (step === 'offer') return '💰';
  if (step === 'presale') return '🔥';
  return '🏠';
}

function emptyHTML(msg) {
  return '<div class="empty-state"><div class="icon">📊</div><div>' + msg + '</div></div>';
}

function escapeHTML(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Main Data Load ----
async function loadData() {
  const days = $('daysPicker').value;
  try {
    const [report, activity, funnel, visitors, paths] = await Promise.all([
      fetch(API + '/api/report?days=' + days).then(r => r.json()),
      fetch(API + '/api/activity?days=' + days + '&limit=20').then(r => r.json()).catch(() => []),
      fetch(API + '/api/funnel?days=' + days).then(r => r.json()).catch(() => ({ steps: [] })),
      fetch(API + '/api/visitors?days=' + days + '&limit=50').then(r => r.json()).catch(() => []),
      fetch(API + '/api/paths?days=' + days + '&limit=15').then(r => r.json()).catch(() => ({ paths: [] })),
    ]);

    renderSummary(report);
    renderChart(report.daily);
    renderFunnel(funnel);
    renderSourceTable(report.by_source);
    renderStateTable(report.by_state);
    renderCampaignTable(report.by_campaign);
    renderActivity(activity);
    renderVisitors(visitors);
    renderPaths(paths);
  } catch (err) {
    console.error('Load failed:', err);
    $('summary').innerHTML = emptyHTML('Failed to load data. Is the tracker running?');
  }
}

// ---- Summary Cards ----
function renderSummary(report) {
  const s = report.summary || {};
  const totalClicks = parseInt(s.total_clicks) || 0;
  const totalEvents = parseInt(s.total_events) || 0;
  const totalRevenue = parseFloat(s.total_revenue) || 0;
  const totalVisitors = parseInt(s.total_visitors) || 0;
  const convertedVisitors = parseInt(s.converted_visitors) || 0;
  const rpl = totalClicks > 0 ? totalRevenue / totalClicks : 0;
  const funnelCvr = totalVisitors > 0 ? ((convertedVisitors / totalVisitors) * 100) : 0;

  $('summary').innerHTML = `
    <div class="stat-card">
      <div class="label">Total Revenue</div>
      <div class="value green">${fmt(totalRevenue)}</div>
      <div class="sub">${num(totalEvents)} events</div>
    </div>
    <div class="stat-card">
      <div class="label">Unique Clicks</div>
      <div class="value blue">${num(totalClicks)}</div>
      <div class="sub">with conversions</div>
    </div>
    <div class="stat-card">
      <div class="label">RPL</div>
      <div class="value yellow">${fmt(rpl)}</div>
      <div class="sub">revenue per lead</div>
    </div>
    <div class="stat-card">
      <div class="label">Calls</div>
      <div class="value">${num(report.daily ? report.daily.reduce((sum, d) => sum + parseInt(d.calls || 0), 0) : 0)}</div>
      <div class="sub">transfer events</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Visitors</div>
      <div class="value accent">${num(totalVisitors)}</div>
      <div class="sub">${num(convertedVisitors)} converted</div>
    </div>
    <div class="stat-card">
      <div class="label">Funnel CVR</div>
      <div class="value orange">${funnelCvr.toFixed(1)}%</div>
      <div class="sub">visitor → conversion</div>
    </div>
  `;
}

// ---- Daily Revenue Chart ----
function renderChart(daily) {
  if (!daily || daily.length === 0) {
    $('chart').innerHTML = emptyHTML('No data yet — postbacks will show here');
    return;
  }
  const sorted = [...daily].sort((a, b) => new Date(a.date) - new Date(b.date));
  const maxRev = Math.max(...sorted.map(d => parseFloat(d.revenue) || 0), 1);
  $('chart').innerHTML = sorted.map(d => {
    const rev = parseFloat(d.revenue) || 0;
    const pctH = Math.max((rev / maxRev) * 100, 2);
    return `
      <div class="bar-group">
        <div class="bar-value">${fmt(rev)}</div>
        <div class="bar" style="height: ${pctH}%" title="${shortDate(d.date)}: ${fmt(rev)} | ${num(d.conversions)} leads | ${num(d.calls)} calls"></div>
        <span class="bar-label">${shortDate(d.date)}</span>
      </div>
    `;
  }).join('');
}

// ---- Funnel Visualization ----
function renderFunnel(data) {
  const steps = data.steps || [];
  $('funnelPeriod').textContent = data.period || '';

  if (steps.length === 0) {
    $('funnelViz').innerHTML = emptyHTML('No funnel data yet — add tracker.js to your landing pages');
    return;
  }

  const stepOrder = ['landing', 'presale', 'offer', 'conversion'];
  const ordered = [...steps].sort((a, b) => {
    return stepOrder.indexOf(a.step_name) - stepOrder.indexOf(b.step_name);
  });

  const topCount = ordered[0] ? ordered[0].visitors : 1;

  $('funnelViz').innerHTML = ordered.map((step, i) => {
    const barWidth = Math.max((step.visitors / Math.max(topCount, 1)) * 100, 1);
    const dropoff = step.dropoff_pct > 0
      ? `<span class="funnel-dropoff">↓${step.dropoff_pct}%</span>`
      : '';
    const timeStr = step.avg_time_ms ? `avg ${fmtTime(step.avg_time_ms)}` : '';

    return `
      <div class="funnel-step">
        <div class="funnel-step-meta">
          <div class="funnel-step-name">
            <span class="funnel-step-icon">${stepIcon(step.step_name)}</span>
            ${tagHTML(step.step_name)}
            ${dropoff}
          </div>
          <div class="funnel-step-stats">
            ${timeStr ? `<span style="font-size:11px;color:var(--muted)">${timeStr}</span>` : ''}
            <span class="funnel-step-count">${num(step.visitors)}</span>
            <span class="funnel-step-pct">${step.pct_of_top}%</span>
          </div>
        </div>
        <div class="funnel-bar-track">
          <div class="funnel-bar-fill ${step.step_name}" style="width: ${barWidth}%"></div>
        </div>
      </div>
    `;
  }).join('');
}

// ---- Source Table ----
function renderSourceTable(sources) {
  if (!sources || sources.length === 0) {
    $('sourceTable').innerHTML = emptyHTML('No source data');
    return;
  }
  $('sourceTable').innerHTML = `<table>
    <tr><th>Source</th><th class="right">Conv.</th><th class="right">Revenue</th><th class="right">Avg</th></tr>
    ${sources.map(s => `<tr>
      <td>${tagHTML(s.source)}</td>
      <td class="right mono">${num(s.conversions)}</td>
      <td class="right mono">${fmt(s.revenue)}</td>
      <td class="right mono">${fmt(s.avg_payout)}</td>
    </tr>`).join('')}
  </table>`;
}

// ---- State Table ----
function renderStateTable(states) {
  if (!states || states.length === 0) {
    $('stateTable').innerHTML = emptyHTML('No state data');
    return;
  }
  $('stateTable').innerHTML = `<table>
    <tr><th>State</th><th class="right">Events</th><th class="right">Revenue</th><th class="right">Avg</th></tr>
    ${states.map(s => `<tr>
      <td><strong>${escapeHTML(s.state)}</strong></td>
      <td class="right mono">${num(s.events)}</td>
      <td class="right mono">${fmt(s.revenue)}</td>
      <td class="right mono">${fmt(s.avg_payout)}</td>
    </tr>`).join('')}
  </table>`;
}

// ---- Campaign Table ----
function renderCampaignTable(campaigns) {
  if (!campaigns || campaigns.length === 0) {
    $('campaignTable').innerHTML = emptyHTML('No campaign data');
    return;
  }
  $('campaignTable').innerHTML = `<table>
    <tr><th>Campaign</th><th class="right">Leads</th><th class="right">Revenue</th><th class="right">RPL</th></tr>
    ${campaigns.map(c => `<tr>
      <td class="mono" style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${escapeHTML(c.campaign_id)}</td>
      <td class="right mono">${num(c.leads)}</td>
      <td class="right mono">${fmt(c.revenue)}</td>
      <td class="right mono">${fmt(c.rpl)}</td>
    </tr>`).join('')}
  </table>`;
}

// ---- Activity Feed ----
function renderActivity(items) {
  if (!items || items.length === 0) {
    $('activityFeed').innerHTML = emptyHTML('No recent activity');
    return;
  }
  $('activityFeed').innerHTML = items.map(a => `
    <div class="activity-item">
      <div class="activity-dot ${a.event_type || 'unknown'}"></div>
      <div class="activity-text">
        ${tagHTML(a.event_type)}
        ${a.state ? '<strong>' + escapeHTML(a.state) + '</strong>' : ''}
        <span class="mono" style="color:var(--muted);font-size:11px">${(a.click_id || '').slice(0, 8)}…</span>
      </div>
      <div class="activity-amount">${fmt(a.payout)}</div>
      <div class="activity-time">${timeAgo(a.created_at)}</div>
    </div>
  `).join('');
}

// ---- Live Visitor Feed ----
function renderVisitors(visitors) {
  const list = Array.isArray(visitors) ? visitors : [];
  $('visitorCount').textContent = list.length;

  if (list.length === 0) {
    $('visitorFeed').innerHTML = emptyHTML('No visitors yet — add tracker.js to your landing pages');
    return;
  }

  $('visitorFeed').innerHTML = list.map(v => {
    const location = [v.city, v.country].filter(Boolean).join(', ') || 'Unknown location';
    const browser = [v.browser, v.os].filter(Boolean).join(' · ') || 'Unknown';
    const stepTag = v.current_step ? tagHTML(v.current_step) : '<span style="color:var(--muted);font-size:11px">no step</span>';
    const evtLabel = (parseInt(v.event_count) || 0) + ' event' + ((parseInt(v.event_count) || 0) !== 1 ? 's' : '');

    return `<div class="visitor-row" onclick="openVisitorModal('${escapeHTML(v.visitor_id)}')">
      <div class="visitor-device-icon">${deviceIcon(v.device)}</div>
      <div class="visitor-info">
        <div class="visitor-location">${escapeHTML(location)}</div>
        <div class="visitor-sub">${escapeHTML(browser)}</div>
      </div>
      <div class="visitor-step">${stepTag}</div>
      <div class="visitor-events">${evtLabel}</div>
      <div class="visitor-time">${timeAgo(v.last_seen)}</div>
    </div>`;
  }).join('');
}

// ---- Conversion Paths ----
function renderPaths(data) {
  const paths = (data && data.paths) || [];

  if (paths.length === 0) {
    $('pathsList').innerHTML = emptyHTML('No path data yet');
    return;
  }

  const maxCount = paths.length > 0 ? parseInt(paths[0].visitor_count) || 1 : 1;

  $('pathsList').innerHTML = paths.map(p => {
    const barW = Math.round((parseInt(p.visitor_count) || 0) / maxCount * 100);
    const pathParts = p.path.split(' → ');
    const pathHTML = pathParts.map(part => `<span class="tag tag-${part.toLowerCase()}" style="margin-right:4px">${part}</span>`).join('<span class="path-arrow"> → </span>');

    return `<div class="path-row">
      <div class="path-text">${pathHTML}</div>
      <div class="path-bar-wrap"><div class="path-bar" style="width:${barW}%"></div></div>
      <div class="path-meta">
        <span>${num(p.visitor_count)} visitor${parseInt(p.visitor_count) !== 1 ? 's' : ''}</span>
        <span>${p.pct}%</span>
      </div>
    </div>`;
  }).join('');
}

// ---- Visitor Detail Modal ----
function openVisitorModal(visitorId) {
  $('visitorModal').classList.add('open');
  $('modalTitle').textContent = 'Visitor · ' + visitorId.slice(0, 8) + '…';
  $('modalBody').innerHTML = '<div class="loading">Loading journey…</div>';

  fetch(API + '/api/visitor/' + encodeURIComponent(visitorId))
    .then(r => r.json())
    .then(data => renderVisitorModal(data))
    .catch(err => {
      $('modalBody').innerHTML = emptyHTML('Failed to load visitor data');
    });
}

function closeModal() {
  $('visitorModal').classList.remove('open');
}

// Close modal on overlay click
$('visitorModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

function renderVisitorModal(data) {
  const v = data.visitor || {};
  const events = data.events || [];
  const steps = data.funnel_steps || [];
  const clicks = data.clicks || [];
  const conversions = data.conversions || [];
  const revenue = parseFloat(data.total_revenue) || 0;

  const metaHTML = `
    <div class="modal-meta">
      <div class="modal-meta-item">
        <div class="modal-meta-label">Device</div>
        <div class="modal-meta-value">${deviceIcon(v.device)} ${escapeHTML(v.device || '—')}</div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Browser</div>
        <div class="modal-meta-value">${escapeHTML(v.browser || '—')}</div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">OS</div>
        <div class="modal-meta-value">${escapeHTML(v.os || '—')}</div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Location</div>
        <div class="modal-meta-value">${escapeHTML([v.city, v.country].filter(Boolean).join(', ') || '—')}</div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">First Seen</div>
        <div class="modal-meta-value">${timeAgo(v.first_seen)}</div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Last Seen</div>
        <div class="modal-meta-value">${timeAgo(v.last_seen)}</div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Revenue</div>
        <div class="modal-meta-value" style="color:var(--green)">${fmt(revenue)}</div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Events</div>
        <div class="modal-meta-value">${num(events.length)}</div>
      </div>
    </div>
  `;

  // Build merged timeline
  const timelineItems = [];

  // Add funnel steps
  steps.forEach(s => {
    timelineItems.push({
      ts: new Date(s.entered_at).getTime(),
      type: 'funnel',
      label: stepIcon(s.step_name) + ' Entered <strong>' + escapeHTML(s.step_name) + '</strong> step',
      detail: s.time_spent_ms ? 'Time on step: ' + fmtTime(s.time_spent_ms) : '',
      time: s.entered_at,
    });
  });

  // Add conversions
  conversions.forEach(c => {
    timelineItems.push({
      ts: new Date(c.created_at).getTime(),
      type: 'conversion',
      label: '💵 Conversion — ' + tagHTML(c.event_type) + (c.state ? ' <strong>' + escapeHTML(c.state) + '</strong>' : ''),
      detail: fmt(c.payout),
      time: c.created_at,
    });
  });

  // Add page events (limit to 100 most recent for display)
  const displayEvents = events.slice(-100);
  displayEvents.forEach(e => {
    const meta = e.metadata ? (typeof e.metadata === 'string' ? JSON.parse(e.metadata) : e.metadata) : {};
    let label = '';
    let detail = '';

    if (e.event_type === 'pageview') {
      label = '👁 Pageview';
      detail = escapeHTML((e.page_url || '').replace(/^https?:\/\/[^/]+/, '').slice(0, 80));
    } else if (e.event_type === 'scroll') {
      label = '📜 Scrolled ' + (meta.depth || '?') + '%';
      detail = '';
    } else if (e.event_type === 'time_on_page') {
      label = '⏱ Time on page: ' + fmtTime(meta.duration_ms);
      detail = '';
    } else if (e.event_type === 'cta_click') {
      label = '🖱 CTA Click';
      detail = escapeHTML((meta.destination || '').slice(0, 80));
    } else if (e.event_type === 'form_start') {
      label = '📝 Form started';
      detail = '';
    } else if (e.event_type === 'form_submit') {
      label = '✅ Form submitted';
      detail = '';
    } else {
      label = escapeHTML(e.event_type || 'event');
    }

    timelineItems.push({
      ts: new Date(e.created_at).getTime(),
      type: e.event_type,
      label,
      detail,
      time: e.created_at,
    });
  });

  // Sort by timestamp
  timelineItems.sort((a, b) => a.ts - b.ts);

  const timelineHTML = timelineItems.length > 0
    ? `<div class="timeline">
        ${timelineItems.map(item => `
          <div class="timeline-item">
            <div class="timeline-dot ${item.type}"></div>
            <div class="timeline-event">${item.label}</div>
            ${item.detail ? `<div class="timeline-detail">${item.detail}</div>` : ''}
            <div class="timeline-time">${timeAgo(item.time)}</div>
          </div>
        `).join('')}
      </div>`
    : emptyHTML('No events recorded yet');

  $('modalBody').innerHTML = metaHTML +
    `<div class="timeline-section-title">Journey Timeline (${timelineItems.length} events)</div>` +
    timelineHTML;
}

// Init
$('daysPicker').addEventListener('change', loadData);
loadData();

// Auto-refresh every 30s
autoRefresh = setInterval(loadData, 30000);
</script>
</body>
