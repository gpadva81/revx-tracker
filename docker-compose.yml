version: '3.8'

services:
  tracker:
    build: .
    ports:
      - "3456:3456"
    environment:
      - DATABASE_URL=postgresql://revx:${POSTGRES_PASSWORD}@db:5432/revx_tracker
      - PORT=3456
    depends_on:
      db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3456/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=revx
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=revx_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revx -d revx_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pgdata:
